name: CI

# Cheap sanity check on every push/PR: the plugin has no test suite (single
# dependency-free file, loaded directly by Bun), so this just confirms the
# source still bundles cleanly before it can be merged or tagged for release.

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun build --target=node src/index.ts --outfile=/tmp/out.js
